<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Camera Broadcast</title>
  <script src="https://www.gstatic.com/firebasejs/11.6.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/11.6.0/firebase-database-compat.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; background: #111; color: #eee; min-height: 100vh; }
    header { background: #1a2a1a; padding: 16px 24px; border-bottom: 1px solid #2a4a2a; }
    header h1 { color: #5dcaa5; font-size: 20px; }
    header p { color: #888; font-size: 13px; margin-top: 4px; }
    .container { max-width: 640px; margin: 0 auto; padding: 24px; }
    .video-wrapper { position: relative; width: 100%; }
    video { width: 100%; border-radius: 12px; background: #000; aspect-ratio: 16/9; border: 1px solid #2a2a2a; display: block; }
    .video-overlay-btns { position: absolute; bottom: 12px; right: 12px; display: flex; gap: 8px; }
    .overlay-btn {
      width: 40px; height: 40px; border-radius: 50%; border: none; cursor: pointer;
      font-size: 18px; display: flex; align-items: center; justify-content: center;
      backdrop-filter: blur(6px); transition: background 0.2s, transform 0.1s;
    }
    .overlay-btn:active { transform: scale(0.92); }
    .overlay-btn.mic-btn { background: rgba(29,158,117,0.85); color: #fff; }
    .overlay-btn.mic-btn.muted { background: rgba(192,57,43,0.85); }
    .overlay-btn.flip-btn { background: rgba(40,40,60,0.85); color: #fff; }
    .overlay-btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .controls { margin-top: 20px; display: flex; flex-direction: column; gap: 12px; }
    label { font-size: 13px; color: #888; }
    input[type="text"] { width: 100%; padding: 10px 14px; border-radius: 8px; border: 1px solid #333; background: #1a1a1a; color: #eee; font-size: 14px; }
    input[type="text"]:focus { outline: none; border-color: #1d9e75; }
    .btn-group { display: flex; gap: 10px; }
    button { flex: 1; padding: 10px; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 500; }
    button.primary { background: #1d9e75; color: #fff; }
    button.primary:hover { background: #17a070; }
    button.danger { background: #c0392b; color: #fff; }
    button.danger:hover { background: #a93226; }
    button:disabled { background: #333; color: #666; cursor: not-allowed; }
    #status { margin-top: 16px; padding: 12px; border-radius: 8px; font-size: 13px; white-space: pre-line; }
    #status.info    { background: #1d9e7522; color: #1d9e75; border: 1px solid #1d9e7555; }
    #status.error   { background: #c0392b22; color: #e74c3c; border: 1px solid #c0392b55; }
    #status.success { background: #2ecc7122; color: #2ecc71; border: 1px solid #2ecc7155; }
    #status.warn    { background: #f39c1222; color: #f39c12; border: 1px solid #f39c1255; }
    .cam-id-display { font-size: 12px; color: #666; margin-top: 8px; }
    .viewer-count   { font-size: 12px; color: #5dcaa5; margin-top: 4px; }
    .mic-indicator {
      position: absolute; top: 10px; left: 12px; background: rgba(0,0,0,0.6);
      border-radius: 20px; padding: 4px 10px; font-size: 12px;
      display: none; align-items: center; gap: 5px; backdrop-filter: blur(4px);
    }
    .mic-indicator.visible { display: flex; }
    .mic-dot { width: 8px; height: 8px; border-radius: 50%; background: #1d9e75; animation: pulse 1.2s infinite; }
    .mic-dot.muted { background: #c0392b; animation: none; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    .cam-face-badge {
      position: absolute; top: 10px; right: 12px; background: rgba(0,0,0,0.55);
      border-radius: 20px; padding: 4px 10px; font-size: 11px; color: #aaa;
      display: none; backdrop-filter: blur(4px);
    }
    .cam-face-badge.visible { display: block; }
    #remoteToast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: #1d9e75; color: #fff; padding: 10px 20px; border-radius: 24px;
      font-size: 13px; font-weight: 500; opacity: 0; pointer-events: none;
      transition: opacity 0.3s; z-index: 999;
    }
    #remoteToast.show { opacity: 1; }

    /* Wake lock status bar */
    #wakeLockBar {
      display: none;
      margin-top: 10px;
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 12px;
      background: #1a2a1a;
      color: #5dcaa5;
      border: 1px solid #2a4a2a;
      align-items: center;
      gap: 8px;
    }
    #wakeLockBar.visible { display: flex; }
    #wakeLockBar.lost { color: #f39c12; border-color: #f39c1244; background: #f39c1211; }
    .wl-dot { width: 8px; height: 8px; border-radius: 50%; background: #5dcaa5; animation: pulse 2s infinite; }
    #wakeLockBar.lost .wl-dot { background: #f39c12; animation: none; }
  </style>
</head>
<body>
  <header>
    <h1>Camera Broadcaster</h1>
    <p>Broadcast your camera via WebRTC + Firebase RTDB</p>
  </header>
  <div class="container">
    <div class="video-wrapper">
      <video id="localVideo" autoplay playsinline muted></video>
      <div class="mic-indicator" id="micIndicator">
        <div class="mic-dot" id="micDot"></div>
        <span id="micLabel">Mic On</span>
      </div>
      <div class="cam-face-badge" id="camFaceBadge">📷 Back</div>
      <div class="video-overlay-btns">
        <button class="overlay-btn mic-btn" id="micBtn" title="Toggle Mic" disabled>🎙️</button>
        <button class="overlay-btn flip-btn" id="flipBtn" title="Flip Camera" disabled>🔄</button>
      </div>
    </div>
    <div class="controls">
      <label>Camera Name</label>
      <input type="text" id="cameraName" placeholder="e.g. Front Door Camera" value="Camera 1">
      <div class="btn-group">
        <button id="startBtn" class="primary">Start Broadcast</button>
        <button id="stopBtn" class="danger" disabled>Stop</button>
      </div>
      <div id="wakeLockBar">
        <div class="wl-dot"></div>
        <span id="wakeLockMsg">Screen kept awake — stream will continue</span>
      </div>
      <div class="cam-id-display" id="camIdDisplay"></div>
      <div class="viewer-count" id="viewerCount"></div>
    </div>
    <div id="status" class="info">Click "Start Broadcast"</div>
  </div>
  <div id="remoteToast"></div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyDewq8U_BYuu01lwgYYTYdvh6bxG8sB3Fc",
      authDomain: "cctv-4aa4c.firebaseapp.com",
      databaseURL: "https://cctv-4aa4c-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "cctv-4aa4c",
      storageBucket: "cctv-4aa4c.firebasestorage.app",
      messagingSenderId: "864560354333",
      appId: "1:864560354333:web:5664d82a983f025ba062f4"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const localVideo    = document.getElementById("localVideo");
    const startBtn      = document.getElementById("startBtn");
    const stopBtn       = document.getElementById("stopBtn");
    const statusEl      = document.getElementById("status");
    const camIdDisplay  = document.getElementById("camIdDisplay");
    const viewerCount   = document.getElementById("viewerCount");
    const micBtn        = document.getElementById("micBtn");
    const flipBtn       = document.getElementById("flipBtn");
    const micIndicator  = document.getElementById("micIndicator");
    const micDot        = document.getElementById("micDot");
    const micLabel      = document.getElementById("micLabel");
    const camFaceBadge  = document.getElementById("camFaceBadge");
    const remoteToast   = document.getElementById("remoteToast");
    const wakeLockBar   = document.getElementById("wakeLockBar");
    const wakeLockMsg   = document.getElementById("wakeLockMsg");

    const RTC_CONFIG = {
      iceServers: [
        { urls: "stun:stun.l.google.com:19302" },
        { urls: "stun:stun1.l.google.com:19302" },
        { urls: "turn:openrelay.metered.ca:80",   username: "openrelayproject", credential: "openrelayproject" },
        { urls: "turn:openrelay.metered.ca:443",  username: "openrelayproject", credential: "openrelayproject" },
        { urls: "turn:openrelay.metered.ca:443?transport=tcp", username: "openrelayproject", credential: "openrelayproject" }
      ]
    };

    let localStream = null, cameraId = null, cameraRef = null;
    let heartbeatInterval = null, isMicMuted = false, currentFacing = "environment";
    const viewers = {};
    let cmdRef = null;

    // ── Wake Lock ────────────────────────────────────────────────
    let wakeLock = null;

    async function acquireWakeLock() {
      if (!("wakeLock" in navigator)) {
        wakeLockBar.classList.add("visible", "lost");
        wakeLockMsg.textContent = "Wake Lock not supported — keep screen on manually";
        return;
      }
      try {
        wakeLock = await navigator.wakeLock.request("screen");
        wakeLockBar.classList.add("visible");
        wakeLockBar.classList.remove("lost");
        wakeLockMsg.textContent = "Screen kept awake — stream will continue";

        wakeLock.addEventListener("release", () => {
          // Re-acquire if broadcasting still active and tab visible
          if (cameraId && document.visibilityState === "visible") {
            acquireWakeLock();
          } else {
            wakeLockBar.classList.add("lost");
            wakeLockMsg.textContent = "Wake lock released — screen may sleep";
          }
        });
      } catch (err) {
        wakeLockBar.classList.add("visible", "lost");
        wakeLockMsg.textContent = "Wake Lock failed: " + err.message;
      }
    }

    function releaseWakeLock() {
      if (wakeLock) { wakeLock.release(); wakeLock = null; }
      wakeLockBar.classList.remove("visible", "lost");
    }

    // Re-acquire wake lock when tab becomes visible again (e.g. user returns)
    document.addEventListener("visibilitychange", async () => {
      if (document.visibilityState === "visible" && cameraId) {
        // Re-acquire wake lock
        if (!wakeLock || wakeLock.released) await acquireWakeLock();
        // Check if any video track ended while in background — restart stream
        const videoTracks = localStream ? localStream.getVideoTracks() : [];
        if (videoTracks.length === 0 || videoTracks[0].readyState === "ended") {
          showToast("Restarting camera track...");
          await restartVideoTrack();
        }
      }
    });

    // ── MediaSession — keeps audio session alive in background ──
    function setupMediaSession() {
      if (!("mediaSession" in navigator)) return;
      navigator.mediaSession.metadata = new MediaMetadata({
        title: "CCTV Broadcasting",
        artist: document.getElementById("cameraName").value || "Camera",
        album: "Live Stream"
      });
      // Dummy handlers so OS doesn't kill the session
      navigator.mediaSession.setActionHandler("play",  () => {});
      navigator.mediaSession.setActionHandler("pause", () => {});
      navigator.mediaSession.setActionHandler("stop",  () => stopBroadcast());
    }

    // ── Silent audio trick — keeps browser audio session alive ──
    // A silent AudioContext oscillator prevents Chrome/Firefox from
    // suspending the tab's media pipeline when screen goes off.
    let audioCtx = null;
    let silentSource = null;

    function startSilentAudio() {
      try {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const oscillator = audioCtx.createOscillator();
        const gainNode   = audioCtx.createGain();
        gainNode.gain.value = 0.00001; // essentially silent
        oscillator.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        oscillator.start();
        silentSource = oscillator;
      } catch (e) { /* non-critical */ }
    }

    function stopSilentAudio() {
      try { if (silentSource) silentSource.stop(); } catch {}
      try { if (audioCtx) audioCtx.close(); } catch {}
      silentSource = null; audioCtx = null;
    }

    // ── Restart video track after background suspend ─────────────
    async function restartVideoTrack() {
      try {
        const newStream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: currentFacing === "environment"
            ? { ideal: "environment" } : { ideal: "user" } },
          audio: false
        });
        const newTrack = newStream.getVideoTracks()[0];
        if (!newTrack) return;

        const oldTrack = localStream.getVideoTracks()[0];
        if (oldTrack) localStream.removeTrack(oldTrack);
        localStream.addTrack(newTrack);
        localVideo.srcObject = localStream;

        for (const vid of Object.values(viewers)) {
          const sender = vid.pc.getSenders().find(s => s.track && s.track.kind === "video");
          if (sender) await sender.replaceTrack(newTrack).catch(() => {});
        }
        setStatus(`Broadcasting — stream recovered`, "success");
      } catch (err) {
        setStatus("Stream recovery failed: " + err.message, "error");
      }
    }

    // ── Toast ────────────────────────────────────────────────────
    function setStatus(msg, type) { statusEl.textContent = msg; statusEl.className = type || "info"; }

    let toastTimer = null;
    function showToast(msg) {
      remoteToast.textContent = "📡 " + msg;
      remoteToast.classList.add("show");
      if (toastTimer) clearTimeout(toastTimer);
      toastTimer = setTimeout(() => remoteToast.classList.remove("show"), 2500);
    }

    if (location.protocol === "file:") {
      setStatus("Use a local server:\nnpx serve .\n\nThen open http://localhost:3000/camera.html", "error");
    }

    // ── Mic toggle ───────────────────────────────────────────────
    micBtn.addEventListener("click", () => toggleMic());

    function toggleMic(fromRemote = false) {
      if (!localStream) return;
      const audioTracks = localStream.getAudioTracks();
      if (audioTracks.length === 0) { setStatus("No microphone track found.", "warn"); return; }
      isMicMuted = !isMicMuted;
      audioTracks.forEach(t => t.enabled = !isMicMuted);
      micBtn.classList.toggle("muted", isMicMuted);
      micBtn.textContent = isMicMuted ? "🔇" : "🎙️";
      micDot.classList.toggle("muted", isMicMuted);
      micLabel.textContent = isMicMuted ? "Mic Off" : "Mic On";
      if (cameraRef) cameraRef.update({ micMuted: isMicMuted });
      if (fromRemote) showToast(isMicMuted ? "Mic Muted" : "Mic Unmuted");
    }

    // ── Flip camera ──────────────────────────────────────────────
    flipBtn.addEventListener("click", () => flipCamera());

    async function flipCamera(fromRemote = false) {
      if (!localStream || !cameraId) return;
      flipBtn.disabled = true;
      currentFacing = currentFacing === "environment" ? "user" : "environment";
      const doFlip = async (exact) => {
        localStream.getVideoTracks().forEach(t => t.stop());
        const constraint = exact ? { facingMode: { exact: currentFacing } } : { facingMode: currentFacing };
        const ns = await navigator.mediaDevices.getUserMedia({ video: constraint, audio: false });
        const newTrack = ns.getVideoTracks()[0];
        const oldTrack = localStream.getVideoTracks()[0];
        if (oldTrack) localStream.removeTrack(oldTrack);
        localStream.addTrack(newTrack);
        localVideo.srcObject = localStream;
        for (const vid of Object.values(viewers)) {
          const sender = vid.pc.getSenders().find(s => s.track && s.track.kind === "video");
          if (sender) await sender.replaceTrack(newTrack);
        }
        camFaceBadge.textContent = currentFacing === "user" ? "📷 Front" : "📷 Back";
        if (cameraRef) cameraRef.update({ facing: currentFacing });
        if (fromRemote) showToast(currentFacing === "user" ? "Switched to Front Camera" : "Switched to Back Camera");
      };
      try { await doFlip(true); }
      catch { try { await doFlip(false); } catch (e) {
        setStatus("Camera flip failed: " + e.message, "warn");
        currentFacing = currentFacing === "environment" ? "user" : "environment";
      }}
      flipBtn.disabled = false;
    }

    // ── Remote commands ──────────────────────────────────────────
    function listenForRemoteCommands() {
      cmdRef = db.ref(`cameras/${cameraId}/remoteCmd`);
      cmdRef.on("child_added", async (snap) => {
        const cmd = snap.val();
        if (!cmd || !cmd.action) return;
        snap.ref.remove();
        switch (cmd.action) {
          case "muteMic":        if (!isMicMuted) toggleMic(true); break;
          case "unmuteMic":      if (isMicMuted)  toggleMic(true); break;
          case "toggleMic":      toggleMic(true); break;
          case "flipCamera":     await flipCamera(true); break;
          case "stopBroadcast":
            showToast("Broadcast stopped remotely");
            setTimeout(() => stopBroadcast(), 800);
            break;
        }
      });
    }

    // ── Start broadcast ──────────────────────────────────────────
    startBtn.addEventListener("click", startBroadcast);
    stopBtn.addEventListener("click", stopBroadcast);

    // ── Auto-start on page load ──────────────────────────────────
    window.addEventListener("load", () => {
      if (location.protocol !== "file:") {
        setTimeout(() => startBroadcast(), 800);
      }
    });

    async function startBroadcast() {
      if (location.protocol === "file:") { setStatus("Cannot use file:// protocol", "error"); return; }
      startBtn.disabled = true;
      setStatus("Requesting camera & microphone...");

      try {
        localStream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: { ideal: "environment" } }, audio: true
        });
        localVideo.srcObject = localStream;
      } catch {
        try {
          localStream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: { ideal: "environment" } }, audio: false
          });
          localVideo.srcObject = localStream;
          setStatus("Mic access denied — broadcasting video only.", "warn");
        } catch (e2) {
          startBtn.disabled = false;
          setStatus("Camera error: " + e2.message, "error");
          return;
        }
      }

      // ── Background-survival setup ────────────────────────────
      await acquireWakeLock();   // Keep screen on
      startSilentAudio();        // Keep audio pipeline alive
      setupMediaSession();       // Register with OS media controls

      // Watch for video track ending (OS killed it in background)
      localStream.getVideoTracks().forEach(track => {
        track.addEventListener("ended", async () => {
          if (cameraId) {
            showToast("Camera track ended — recovering...");
            await restartVideoTrack();
          }
        });
      });
      // ────────────────────────────────────────────────────────

      micBtn.disabled = false; flipBtn.disabled = false;
      micIndicator.classList.add("visible"); camFaceBadge.classList.add("visible");
      const hasAudio = localStream.getAudioTracks().length > 0;
      micBtn.disabled = !hasAudio;
      if (!hasAudio) { micLabel.textContent = "No Mic"; micDot.classList.add("muted"); }

      stopBtn.disabled = false;
      const name = document.getElementById("cameraName").value.trim() || "Camera";
      cameraId  = name.toLowerCase().replace(/[^a-z0-9]/g, "-") + "-" + Date.now().toString(36);
      cameraRef = db.ref("cameras/" + cameraId);
      camIdDisplay.textContent = "Camera ID: " + cameraId;

      try {
        await cameraRef.set({ name, status: "online", lastSeen: Date.now(), micMuted: false, facing: currentFacing });
        cameraRef.onDisconnect().remove();
        heartbeatInterval = setInterval(() => { if (cameraRef) cameraRef.update({ lastSeen: Date.now() }); }, 10000);
        setStatus(`Broadcasting "${name}" — waiting for viewers...`);

        listenForRemoteCommands();

        db.ref(`cameras/${cameraId}/viewerRequests`).on("child_added", async (snap) => {
          const viewerId = snap.key;
          if (viewers[viewerId]) return;
          await handleNewViewer(viewerId);
        });
        db.ref(`cameras/${cameraId}/viewers`).on("child_removed", (snap) => cleanupViewer(snap.key));

      } catch (err) {
        setStatus("Broadcast setup failed:\n" + err.message + "\n\nCheck Firebase Rules.", "error");
      }
    }

    async function handleNewViewer(viewerId) {
      try {
        const pc = new RTCPeerConnection(RTC_CONFIG);
        viewers[viewerId] = { pc, refs: [] };
        updateViewerCount();
        localStream.getTracks().forEach(track => pc.addTrack(track, localStream));
        const iceCandQueue = []; let remoteSet = false;

        pc.onicecandidate = (e) => {
          if (e.candidate) db.ref(`cameras/${cameraId}/viewers/${viewerId}/camCandidates`).push({
            candidate: e.candidate.candidate, sdpMid: e.candidate.sdpMid, sdpMLineIndex: e.candidate.sdpMLineIndex
          });
        };
        pc.oniceconnectionstatechange = () => {
          const s = pc.iceConnectionState;
          if (s === "connected" || s === "completed")
            setStatus(`Viewer${Object.keys(viewers).length>1?"s":""} connected! Streaming...`, "success");
          else if (s === "failed") cleanupViewer(viewerId);
          updateViewerCount();
        };

        const offer = await pc.createOffer();
        await pc.setLocalDescription(offer);
        await db.ref(`cameras/${cameraId}/viewers/${viewerId}/offer`).set({ type: offer.type, sdp: offer.sdp });

        const answerRef = db.ref(`cameras/${cameraId}/viewers/${viewerId}/answer`);
        viewers[viewerId].refs.push(answerRef);
        answerRef.on("value", async (snap) => {
          if (snap.val()?.type && pc.signalingState !== "closed" && !remoteSet) {
            remoteSet = true;
            await pc.setRemoteDescription(new RTCSessionDescription(snap.val()));
            for (const c of iceCandQueue) await pc.addIceCandidate(new RTCIceCandidate(c)).catch(() => {});
            iceCandQueue.length = 0;
          }
        });

        const viewerCandRef = db.ref(`cameras/${cameraId}/viewers/${viewerId}/viewerCandidates`);
        viewers[viewerId].refs.push(viewerCandRef);
        viewerCandRef.on("child_added", async (snap) => {
          const c = snap.val();
          if (!c || pc.signalingState === "closed") return;
          if (!remoteSet) iceCandQueue.push(c);
          else await pc.addIceCandidate(new RTCIceCandidate(c)).catch(() => {});
        });
      } catch (err) { console.error("Viewer setup error:", err); cleanupViewer(viewerId); }
    }

    function cleanupViewer(viewerId) {
      const v = viewers[viewerId]; if (!v) return;
      v.refs.forEach(r => r.off());
      if (v.pc) v.pc.close();
      if (cameraId) db.ref(`cameras/${cameraId}/viewers/${viewerId}`).remove();
      delete viewers[viewerId]; updateViewerCount();
    }

    function updateViewerCount() {
      const n = Object.keys(viewers).length;
      viewerCount.textContent = n > 0 ? `${n} viewer${n > 1 ? "s" : ""} connected` : "";
    }

    function stopBroadcast() {
      if (cmdRef) { cmdRef.off(); cmdRef = null; }
      Object.keys(viewers).forEach(cleanupViewer);
      if (heartbeatInterval) { clearInterval(heartbeatInterval); heartbeatInterval = null; }
      if (localStream) { localStream.getTracks().forEach(t => t.stop()); localStream = null; }
      localVideo.srcObject = null;
      if (cameraRef) { cameraRef.remove(); cameraRef = null; }

      releaseWakeLock();
      stopSilentAudio();

      cameraId = null; isMicMuted = false; currentFacing = "environment";
      startBtn.disabled = false; stopBtn.disabled = true;
      micBtn.disabled = true; flipBtn.disabled = true;
      micBtn.textContent = "🎙️"; micBtn.classList.remove("muted");
      micIndicator.classList.remove("visible"); camFaceBadge.classList.remove("visible");
      camIdDisplay.textContent = ""; viewerCount.textContent = "";
      setStatus("Broadcast stopped", "info");
    }

    window.addEventListener("beforeunload", stopBroadcast);
  </script>
</body>
</html>
