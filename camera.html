<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Camera Broadcast</title>
  <script src="https://www.gstatic.com/firebasejs/11.6.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/11.6.0/firebase-database-compat.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; background: #111; color: #eee; min-height: 100vh; }
    header { background: #1a2a1a; padding: 16px 24px; border-bottom: 1px solid #2a4a2a; }
    header h1 { color: #5dcaa5; font-size: 20px; }
    header p { color: #888; font-size: 13px; margin-top: 4px; }
    .container { max-width: 640px; margin: 0 auto; padding: 24px; }
    video { width: 100%; border-radius: 12px; background: #000; aspect-ratio: 16/9; border: 1px solid #2a2a2a; }
    .controls { margin-top: 20px; display: flex; flex-direction: column; gap: 12px; }
    label { font-size: 13px; color: #888; }
    input[type="text"] { width: 100%; padding: 10px 14px; border-radius: 8px; border: 1px solid #333; background: #1a1a1a; color: #eee; font-size: 14px; }
    input[type="text"]:focus { outline: none; border-color: #1d9e75; }
    .btn-group { display: flex; gap: 10px; }
    button { flex: 1; padding: 10px; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 500; }
    button.primary { background: #1d9e75; color: #fff; }
    button.primary:hover { background: #17a070; }
    button.danger { background: #c0392b; color: #fff; }
    button.danger:hover { background: #a93226; }
    button:disabled { background: #333; color: #666; cursor: not-allowed; }
    #status { margin-top: 16px; padding: 12px; border-radius: 8px; font-size: 13px; white-space: pre-line; }
    #status.info { background: #1d9e7522; color: #1d9e75; border: 1px solid #1d9e7555; }
    #status.error { background: #c0392b22; color: #e74c3c; border: 1px solid #c0392b55; }
    #status.success { background: #2ecc7122; color: #2ecc71; border: 1px solid #2ecc7155; }
    #status.warn { background: #f39c1222; color: #f39c12; border: 1px solid #f39c1255; }
    .cam-id-display { font-size: 12px; color: #666; margin-top: 8px; }
    .viewer-count { font-size: 12px; color: #5dcaa5; margin-top: 4px; }
  </style>
</head>
<body>
  <header>
    <h1>Camera Broadcaster</h1>
    <p>Broadcast your camera via WebRTC + Firebase RTDB</p>
  </header>
  <div class="container">
    <video id="localVideo" autoplay playsinline muted></video>
    <div class="controls">
      <label>Camera Name</label>
      <input type="text" id="cameraName" placeholder="e.g. Front Door Camera" value="Camera 1">
      <div class="btn-group">
        <button id="startBtn" class="primary">Start Broadcast</button>
        <button id="stopBtn" class="danger" disabled>Stop</button>
      </div>
      <div class="cam-id-display" id="camIdDisplay"></div>
      <div class="viewer-count" id="viewerCount"></div>
    </div>
    <div id="status" class="info">Click "Start Broadcast"</div>
  </div>

  <script>
    // =====================================================================
    // FIX 1: Firebase config — replace apiKey with your own from Firebase
    // Console > Project Settings > Your apps > Web app config
    // =====================================================================
    const firebaseConfig = {
      apiKey: "AIzaSyDewq8U_BYuu01lwgYYTYdvh6bxG8sB3Fc",
      authDomain: "cctv-4aa4c.firebaseapp.com",
      databaseURL: "https://cctv-4aa4c-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "cctv-4aa4c",
      storageBucket: "cctv-4aa4c.firebasestorage.app",
      messagingSenderId: "864560354333",
      appId: "1:864560354333:web:5664d82a983f025ba062f4"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const localVideo   = document.getElementById("localVideo");
    const startBtn     = document.getElementById("startBtn");
    const stopBtn      = document.getElementById("stopBtn");
    const statusEl     = document.getElementById("status");
    const camIdDisplay = document.getElementById("camIdDisplay");
    const viewerCount  = document.getElementById("viewerCount");

    // FIX 2: TURN server added — fixes P2P fail on different networks (4G vs WiFi)
    const RTC_CONFIG = {
      iceServers: [
        { urls: "stun:stun.l.google.com:19302" },
        { urls: "stun:stun1.l.google.com:19302" },
        // Free TURN from metered.ca — register at https://www.metered.ca/tools/openrelay/
        // Replace with your own for production
        { urls: "turn:openrelay.metered.ca:80",   username: "openrelayproject", credential: "openrelayproject" },
        { urls: "turn:openrelay.metered.ca:443",  username: "openrelayproject", credential: "openrelayproject" },
        { urls: "turn:openrelay.metered.ca:443?transport=tcp", username: "openrelayproject", credential: "openrelayproject" }
      ]
    };

    let localStream = null;
    let cameraId    = null;
    let cameraRef   = null;
    let heartbeatInterval = null;

    // FIX 3: Multi-viewer support — each viewer gets own PeerConnection
    // viewers map: { viewerId -> { pc, refs } }
    const viewers = {};

    function setStatus(msg, type) { statusEl.textContent = msg; statusEl.className = type || "info"; }
    function updateViewerCount() {
      const n = Object.keys(viewers).length;
      viewerCount.textContent = n > 0 ? `${n} viewer${n > 1 ? "s" : ""} connected` : "";
    }

    if (location.protocol === "file:") {
      setStatus("Use a local server:\nnpx serve .\n\nThen open http://localhost:3000/camera.html", "error");
    }

    startBtn.addEventListener("click", startBroadcast);
    stopBtn.addEventListener("click", stopBroadcast);

    async function startBroadcast() {
      if (location.protocol === "file:") { setStatus("Cannot use file:// protocol", "error"); return; }
      startBtn.disabled = true;

      setStatus("Requesting camera...");
      try {
        localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
        localVideo.srcObject = localStream;
      } catch (err) {
        startBtn.disabled = false;
        if (err.name === "NotAllowedError") setStatus("Camera permission denied.\nAllow camera access and try again.", "error");
        else if (err.name === "NotFoundError") setStatus("No camera found.", "error");
        else setStatus("Camera error: " + err.message, "error");
        return;
      }

      stopBtn.disabled = false;
      const name = document.getElementById("cameraName").value.trim() || "Camera";
      cameraId  = name.toLowerCase().replace(/[^a-z0-9]/g, "-") + "-" + Date.now().toString(36);
      cameraRef = db.ref("cameras/" + cameraId);
      camIdDisplay.textContent = "Camera ID: " + cameraId;

      try {
        // Write camera info to Firebase (no offer here — offer is per-viewer now)
        await cameraRef.set({ name, status: "online", lastSeen: Date.now() });
        cameraRef.onDisconnect().remove();

        // FIX 4: Heartbeat — updates lastSeen every 10s so stale cameras can be detected
        heartbeatInterval = setInterval(() => {
          if (cameraRef) cameraRef.update({ lastSeen: Date.now() });
        }, 10000);

        setStatus(`Broadcasting "${name}" — waiting for viewers...`);

        // FIX 3 (cont): Listen for viewer join requests
        // Each viewer writes to cameras/{camId}/viewerRequests/{viewerId}
        const requestsRef = db.ref(`cameras/${cameraId}/viewerRequests`);
        requestsRef.on("child_added", async (snap) => {
          const viewerId = snap.key;
          if (viewers[viewerId]) return; // already handling this viewer
          await handleNewViewer(viewerId);
        });

        // Clean up viewers who disconnected
        const answersRef = db.ref(`cameras/${cameraId}/viewers`);
        answersRef.on("child_removed", (snap) => {
          const viewerId = snap.key;
          cleanupViewer(viewerId);
        });

      } catch (err) {
        console.error("Firebase error:", err);
        setStatus("Broadcast setup failed:\n" + err.message + "\n\nCheck Firebase Rules.", "error");
      }
    }

    async function handleNewViewer(viewerId) {
      try {
        // FIX 2 (cont): Use full RTC_CONFIG with TURN servers
        const pc = new RTCPeerConnection(RTC_CONFIG);
        viewers[viewerId] = { pc, refs: [] };
        updateViewerCount();

        localStream.getTracks().forEach(track => pc.addTrack(track, localStream));

        // FIX 5: ICE candidate queue — buffer candidates until remoteDescription is set
        const iceCandQueue = [];
        let remoteSet = false;

        pc.onicecandidate = (event) => {
          if (event.candidate) {
            db.ref(`cameras/${cameraId}/viewers/${viewerId}/camCandidates`).push({
              candidate: event.candidate.candidate,
              sdpMid: event.candidate.sdpMid,
              sdpMLineIndex: event.candidate.sdpMLineIndex
            });
          }
        };

        pc.oniceconnectionstatechange = () => {
          const state = pc.iceConnectionState;
          if (state === "connected" || state === "completed") {
            setStatus(`Viewer${Object.keys(viewers).length > 1 ? "s" : ""} connected! Streaming...`, "success");
          } else if (state === "failed") {
            cleanupViewer(viewerId);
          }
          updateViewerCount();
        };

        // Create offer for this specific viewer
        const offer = await pc.createOffer();
        await pc.setLocalDescription(offer);

        // Write offer for this viewer
        await db.ref(`cameras/${cameraId}/viewers/${viewerId}/offer`).set({
          type: offer.type, sdp: offer.sdp
        });

        // Listen for viewer's answer
        const answerRef = db.ref(`cameras/${cameraId}/viewers/${viewerId}/answer`);
        viewers[viewerId].refs.push(answerRef);
        answerRef.on("value", async (snap) => {
          if (snap.val()?.type && pc.signalingState !== "closed" && !remoteSet) {
            remoteSet = true;
            await pc.setRemoteDescription(new RTCSessionDescription(snap.val()));
            // FIX 5: Apply queued ICE candidates after remoteDescription is set
            for (const c of iceCandQueue) {
              await pc.addIceCandidate(new RTCIceCandidate(c)).catch(() => {});
            }
            iceCandQueue.length = 0;
          }
        });

        // Listen for viewer's ICE candidates
        const viewerCandRef = db.ref(`cameras/${cameraId}/viewers/${viewerId}/viewerCandidates`);
        viewers[viewerId].refs.push(viewerCandRef);
        viewerCandRef.on("child_added", async (snap) => {
          const c = snap.val();
          if (!c || pc.signalingState === "closed") return;
          if (!remoteSet) {
            // FIX 5: Queue if remoteDescription not set yet
            iceCandQueue.push(c);
          } else {
            await pc.addIceCandidate(new RTCIceCandidate(c)).catch(() => {});
          }
        });

      } catch (err) {
        console.error("Viewer setup error:", err);
        cleanupViewer(viewerId);
      }
    }

    function cleanupViewer(viewerId) {
      const v = viewers[viewerId];
      if (!v) return;
      v.refs.forEach(r => r.off());
      if (v.pc) v.pc.close();
      // Clean up viewer's Firebase data
      if (cameraId) db.ref(`cameras/${cameraId}/viewers/${viewerId}`).remove();
      delete viewers[viewerId];
      updateViewerCount();
    }

    function stopBroadcast() {
      // Clean up all viewers
      Object.keys(viewers).forEach(cleanupViewer);

      // Stop heartbeat
      if (heartbeatInterval) { clearInterval(heartbeatInterval); heartbeatInterval = null; }

      // Stop media
      if (localStream) { localStream.getTracks().forEach(t => t.stop()); localStream = null; }
      localVideo.srcObject = null;

      // Remove from Firebase
      if (cameraRef) { cameraRef.remove(); cameraRef = null; }

      cameraId = null;
      startBtn.disabled = false;
      stopBtn.disabled  = true;
      camIdDisplay.textContent = "";
      viewerCount.textContent  = "";
      setStatus("Broadcast stopped", "info");
    }

    // FIX 6: Cleanup Firebase listener on page unload
    window.addEventListener("beforeunload", stopBroadcast);
  </script>
</body>
</html>
