<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CCTV Viewer</title>
  <script src="https://www.gstatic.com/firebasejs/11.6.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/11.6.0/firebase-database-compat.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; background: #111; color: #eee; min-height: 100vh; }
    header { background: #1a2a1a; padding: 16px 24px; border-bottom: 1px solid #2a4a2a; }
    header h1 { color: #5dcaa5; font-size: 20px; }
    header p { color: #888; font-size: 13px; margin-top: 4px; }
    .container { max-width: 1200px; margin: 0 auto; padding: 24px; }
    .cameras-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; margin-top: 20px; }
    .camera-card { background: #1a1a1a; border-radius: 12px; border: 1px solid #2a2a2a; overflow: hidden; transition: border-color 0.2s; }
    .camera-card.online { border-color: #1d9e75; }
    .camera-card.offline { border-color: #444; opacity: 0.6; }
    .camera-card .header { padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; }
    .camera-card .name { font-weight: 600; font-size: 14px; }
    .camera-card .status-badge { font-size: 11px; padding: 2px 10px; border-radius: 10px; }
    .status-badge.online { background: #1d9e7522; color: #1d9e75; border: 1px solid #1d9e75; }
    .status-badge.offline { background: #444; color: #888; }
    .camera-card video { width: 100%; display: block; background: #000; aspect-ratio: 16/9; }
    .camera-card .actions { padding: 10px 16px; }
    .camera-card button { width: 100%; padding: 8px; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; background: #1d9e75; color: #fff; font-weight: 500; }
    .camera-card button:hover { background: #17a070; }
    .camera-card button:disabled { background: #333; color: #666; cursor: not-allowed; }
    .no-cameras { text-align: center; padding: 60px 20px; color: #666; }
    .no-cameras h2 { font-size: 18px; margin-bottom: 8px; }
    .no-cameras p { font-size: 13px; }
    .no-cameras code { background: #222; color: #5dcaa5; padding: 2px 6px; border-radius: 4px; }
    #status { color: #888; font-size: 13px; margin-top: 16px; text-align: center; }
    .stream-count { font-size: 13px; color: #5dcaa5; text-align: center; margin-top: 8px; }
  </style>
</head>
<body>
  <header>
    <h1>CCTV Viewer</h1>
    <p>WebRTC cameras via Firebase RTDB signaling</p>
  </header>
  <div class="container">
    <div id="cameras-container">
      <div class="no-cameras" id="empty-state">
        <h2>No cameras available</h2>
        <p>Open <code>camera.html</code> on a device to start broadcasting.</p>
      </div>
      <div class="cameras-grid" id="cameras-grid"></div>
    </div>
    <div id="status">Connecting to Firebase...</div>
  </div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyDewq8U_BYuu01lwgYYTYdvh6bxG8sB3Fc",
      authDomain: "cctv-4aa4c.firebaseapp.com",
      databaseURL: "https://cctv-4aa4c-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "cctv-4aa4c",
      storageBucket: "cctv-4aa4c.firebasestorage.app",
      messagingSenderId: "864560354333",
      appId: "1:864560354333:web:5664d82a983f025ba062f4",
      measurementId: "G-YZG0B4T82Z"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const camerasRef = db.ref("cameras");
    const grid = document.getElementById("cameras-grid");
    const emptyState = document.getElementById("empty-state");
    const statusEl = document.getElementById("status");

    const peerConnections = {};

    camerasRef.on("value", (snapshot) => {
      const cameras = snapshot.val();
      grid.innerHTML = "";
      if (!cameras) {
        emptyState.style.display = "block";
        grid.style.display = "none";
        statusEl.textContent = "Waiting for cameras...";
        return;
      }
      emptyState.style.display = "none";
      grid.style.display = "grid";
      const count = Object.keys(cameras).length;
      statusEl.textContent = `${count} camera${count > 1 ? 's' : ''} found`;
      for (const [id, data] of Object.entries(cameras)) {
        addCameraCard(id, data);
      }
    });

    function addCameraCard(cameraId, data) {
      const card = document.createElement("div");
      card.className = "camera-card online";
      card.id = `card-${cameraId}`;
      card.innerHTML = `
        <div class="header">
          <span class="name">${data.name || cameraId}</span>
          <span class="status-badge online">LIVE</span>
        </div>
        <video id="video-${cameraId}" autoplay playsinline muted></video>
        <div class="actions">
          <button id="btn-${cameraId}" data-camera-id="${cameraId}">Connect to Stream</button>
        </div>
      `;
      const btn = card.querySelector("button");
      btn.addEventListener("click", () => connectToCamera(cameraId, btn));
      grid.appendChild(card);
    }

    async function connectToCamera(cameraId, btn) {
      if (peerConnections[cameraId]) {
        peerConnections[cameraId].close();
        delete peerConnections[cameraId];
        btn.textContent = "Connect to Stream";
        document.getElementById(`video-${cameraId}`).srcObject = null;
        return;
      }

      btn.disabled = true;
      btn.textContent = "Connecting...";

      try {
        const video = document.getElementById(`video-${cameraId}`);
        const pc = new RTCPeerConnection({
          iceServers: [{ urls: "stun:stun.l.google.com:19302" }]
        });
        peerConnections[cameraId] = pc;

        pc.ontrack = (event) => {
          video.srcObject = event.streams[0];
          btn.textContent = "Disconnect";
          btn.disabled = false;
        };

        pc.onicecandidate = (event) => {
          if (event.candidate) {
            db.ref(`cameras/${cameraId}/viewerCandidates`).push({
              candidate: event.candidate.candidate,
              sdpMid: event.candidate.sdpMid,
              sdpMLineIndex: event.candidate.sdpMLineIndex
            });
          }
        };

        pc.oniceconnectionstatechange = () => {
          if (pc.iceConnectionState === "disconnected" || pc.iceConnectionState === "failed") {
            cleanup(cameraId);
          }
        };

        const camSnap = await db.ref(`cameras/${cameraId}`).once("value");
        const cam = camSnap.val();
        if (!cam || !cam.offer) throw new Error("No offer from camera");

        await pc.setRemoteDescription(new RTCSessionDescription(cam.offer));
        const answer = await pc.createAnswer();
        await pc.setLocalDescription(answer);
        await db.ref(`cameras/${cameraId}/answer`).set({ type: answer.type, sdp: answer.sdp });

        db.ref(`cameras/${cameraId}/candidates`).on("child_added", (snap) => {
          if (snap.val()) {
            const c = snap.val();
            pc.addIceCandidate(new RTCIceCandidate({ candidate: c.candidate, sdpMid: c.sdpMid, sdpMLineIndex: c.sdpMLineIndex }));
          }
        });

        btn.textContent = "Disconnect";
        btn.disabled = false;

      } catch (err) {
        console.error(err);
        statusEl.textContent = `Error: ${err.message}`;
        btn.textContent = "Connect to Stream";
        btn.disabled = false;
        delete peerConnections[cameraId];
      }
    }

    function cleanup(cameraId) {
      if (peerConnections[cameraId]) {
        peerConnections[cameraId].close();
        delete peerConnections[cameraId];
      }
      const btn = document.getElementById(`btn-${cameraId}`);
      if (btn) {
        btn.textContent = "Connect to Stream";
        btn.disabled = false;
      }
      const video = document.getElementById(`video-${cameraId}`);
      if (video) video.srcObject = null;
    }

    statusEl.textContent = "Connected. Waiting for cameras...";
  </script>
</body>
</html>
